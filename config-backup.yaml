application:
  concurrency: 30 # 当前应用允许并发度
  work_path: ./data/workspace/ # 统一临时工作目录，所有备份先落地到这里
  workspace_retention: 1 # 工作目录保留份数，默认1
  task_timeout_s: 3600 # 单个备份任务超时时间（秒），0表示不限制
  log:
    dir: ./data/logs/
  database:
    db_type: sqlite # 使用的数据库类型
    file_path: ./data/meta.db # 使用文件路径
    journal_mode: WAL # 事务日志模式
    synchronous: NORMAL # 同步策略
    busy_timeout: 5000 # 锁等待时间（毫秒）
    max_open_conns: 10 # 最大连接数，建议设置为并发数
  retry:
    max_attempts: 3 # 重试次数
    initial_delay_ms: 1000 # 初始延迟（毫秒）
    max_delay_ms: 10000 # 最大延迟（毫秒）
  notify:
    # 可选：通知消息模板；不填则默认 success=0, failed=0, sync_failed=0
    # 占位符包括 {success}, {failed}, {sync_failed}
    template: "dbkeeper处理完成，成功{success}个，失败{failed}个，同步失败{sync_failed}个。"
    channels:
      - name: chuckfang-main
        channel_type: chuckfang # 必填
        url: https://api.chuckfang.com/xxx # 必填
      - name: dingtalk-robot
        channel_type: dingtalk # 必填
        url: https://oapi.dingtalk.com/robot/send # 必填
        access_token: xxxx # 必填
        sign: xxxx # 可选：仅开启“加签”安全设置时必填
        keyword: xxxx # 可选：若填写，钉钉消息末尾追加“关键字：xxx”
        at:
          isAtAll: false # true 时不再拼接指定手机号
          atMobiles: # isAtAll=false 时生效，会在消息末尾拼接 @手机号
            - 18188888888
            - 18199999999
  snapshots:
    - id: 97_mysql_dev_schema_name
      db_type: mysql
      ip: 192.168.7.97
      port: 3306
      username: root
      password: password1234
      schema: schema_name
      storages:
        - id: local
          type: local # 支持 local/host/s3/webdav
          path: /data/snapshots/mysql/97_mysql_dev_schema_name/
          retention_count: 5
        - id: storage01
          type: host # 支持 local/host/s3/webdav
          ip: 192.168.7.96
          port: 22
          path: /data/snapshots/mysql/97_mysql_dev_schema_name/
          username: root
          password: password1234
          retention_count: 5
        - id: storage02
          type: host # 支持 local/host/s3/webdav
          ip: 192.168.7.98
          port: 22
          path: /data/snapshots/mysql/97_mysql_dev_schema_name/
          username: root
          password: password1234
          retention_count: 5
        - id: storage03
          type: s3
          endpoint: 192.168.7.94:9000
          username: user
          password: password1234
          path: backup-bucket/data/snapshots/mysql/97_mysql_dev_schema_name/
          retention_count: 2
    - id: 97_dm_dev_schema_name
      db_type: dm
      cmd_path: /opt/dmdbms/bin/dexp  # 不填默认从Path里面获取
      ip: 192.168.7.97
